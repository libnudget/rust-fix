---
name: Rust Fix
description: Auto-fix Rust code with cargo fmt and clippy

inputs:
  fixes:
    description: Fixes to apply (fmt, clippy, all)
    required: false
    default: all

runs:
  using: composite
  steps:
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt, clippy

    - name: Apply cargo fmt
      if: inputs.fixes == 'all' || inputs.fixes == 'fmt'
      shell: bash
      run: cargo fmt

    - name: Apply clippy fixes
      if: inputs.fixes == 'all' || inputs.fixes == 'clippy'
      shell: bash
      run: cargo clippy --fix --allow-dirty --allow-staged

    - name: Commit changes
      shell: bash
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "github-actions[bot]"
        if git diff --quiet; then exit 0; fi
        git add -A
        git commit -m "Auto-fix: ${{ inputs.fixes }}"
        git push